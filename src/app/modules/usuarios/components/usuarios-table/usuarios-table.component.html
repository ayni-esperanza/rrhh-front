<section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
  <div class="overflow-x-auto">
    <table class="w-full min-w-[760px] text-left text-xs">
      <thead class="bg-slate-50 text-[11px] font-bold text-slate-700 dark:bg-slate-800 dark:text-slate-300">
        <tr><th class="px-3 py-3">Nombre</th><th class="px-3 py-3">Correo</th><th class="px-3 py-3">Rol</th><th class="px-3 py-3">Ultimo acceso</th><th class="px-3 py-3">Estado</th></tr>
      </thead>
      <tbody class="divide-y divide-slate-200 text-[11px] text-slate-800 dark:divide-slate-800 dark:text-slate-200">
        @for (usuario of usuarios; track usuario.correo) {
          <tr class="transition hover:bg-slate-50/70 dark:hover:bg-slate-800/50">
            <td class="px-3 py-3"><div class="flex items-center gap-2"><span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-blue-100 text-[11px] font-bold text-blue-700 dark:bg-blue-500/15 dark:text-blue-300">{{ usuario.nombre.charAt(0) }}</span><span class="font-bold text-slate-900 dark:text-white">{{ usuario.nombre }}</span></div></td>
            <td class="px-3 py-3 font-medium text-slate-600 dark:text-slate-300">{{ usuario.correo }}</td>
            <td class="px-3 py-3"><span class="inline-flex rounded-md bg-slate-100 px-2 py-0.5 font-semibold text-slate-700 dark:bg-slate-800 dark:text-slate-300">{{ rolLabel(usuario.rol) }}</span></td>
            <td class="px-3 py-3 text-slate-600 dark:text-slate-300">{{ usuario.ultimoAcceso }}</td>
            <td class="px-3 py-3"><span class="inline-flex rounded-md px-2 py-0.5 font-semibold capitalize" [class]="estadoClasses(usuario.estado)">{{ usuario.estado }}</span></td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  <footer class="flex flex-col gap-2 border-t border-slate-200 px-3 py-2 text-[11px] text-slate-500 dark:border-slate-800 sm:flex-row sm:items-center sm:justify-between">
    <span>Mostrando {{ usuarios.length }} usuarios</span>
    <nav class="flex items-center gap-1.5" aria-label="Paginacion"><button class="h-7 w-7 rounded-md border border-slate-200 text-slate-500 dark:border-slate-800" type="button" aria-label="Pagina anterior"><svg class="mx-auto h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6" /></svg></button><button class="h-7 w-7 rounded-md border border-green-200 bg-green-50 font-semibold text-green-700 dark:border-green-500/30 dark:bg-green-500/10 dark:text-green-300" type="button">1</button><button class="h-7 w-7 rounded-md border border-slate-200 text-slate-500 dark:border-slate-800" type="button" aria-label="Pagina siguiente"><svg class="mx-auto h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6" /></svg></button></nav>
  </footer>
</section>
