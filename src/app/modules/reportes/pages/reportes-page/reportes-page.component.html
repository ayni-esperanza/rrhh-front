<app-page-header title="Reportes" description="Generación y consulta de reportes de Recursos Humanos." />
<section class="space-y-3">
  @for (reporte of reportes; track reporte.nombre) {
    <article class="rounded-lg border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900">
      <h2 class="font-semibold">{{ reporte.nombre }}</h2>
      <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">{{ reporte.tipo }} · Última generación: {{ reporte.ultimaGeneracion }}</p>
    </article>
  }
</section>
