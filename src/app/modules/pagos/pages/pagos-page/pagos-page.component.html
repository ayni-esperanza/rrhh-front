<app-page-header title="Pagos" description="Cálculo, registro y seguimiento de pagos." />
<section class="grid gap-4 md:grid-cols-3">
  @for (pago of pagos; track pago.colaborador) {
    <article class="rounded-lg border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900">
      <h2 class="font-semibold">{{ pago.colaborador }}</h2>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">{{ pago.periodo }}</p>
      <p class="mt-4 text-2xl font-semibold">{{ pago.monto | currency:'PEN':'symbol':'1.2-2' }}</p>
      <p class="mt-2 text-sm">{{ pago.estado }}</p>
    </article>
  }
</section>
