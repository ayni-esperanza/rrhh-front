<app-page-header title="Dashboard" description="Indicadores generales para seguimiento de Recursos Humanos." />

<section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
  @for (indicator of indicators; track indicator.label) {
    <article class="rounded-lg border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900">
      <p class="text-sm text-slate-500 dark:text-slate-400">{{ indicator.label }}</p>
      <strong class="mt-3 block text-3xl font-semibold text-slate-950 dark:text-white">{{ indicator.value }}</strong>
      <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">{{ indicator.detail }}</p>
    </article>
  }
</section>
