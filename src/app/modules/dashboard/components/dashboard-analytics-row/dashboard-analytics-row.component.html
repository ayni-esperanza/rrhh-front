<section class="grid gap-3 xl:grid-cols-[1.4fr_.7fr_1.2fr]">
  <article class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <h2 class="text-xs font-bold text-slate-950 dark:text-white">Porcentaje de ausentismo por area</h2>
    <div class="mt-3 h-44 overflow-hidden">
      <ngx-charts-bar-vertical
        [view]="[430, 170]"
        [results]="areaAbsenteeism"
        [scheme]="areaScheme"
        [legend]="false"
        [xAxis]="true"
        [yAxis]="true"
        [showGridLines]="true"
        [roundEdges]="true"
        [showDataLabel]="true"
        [dataLabelFormatting]="percentFormat"
        [yAxisTickFormatting]="percentFormat"
        [barPadding]="20"
        [animations]="true">
      </ngx-charts-bar-vertical>
    </div>
    <a class="mt-1 block text-center text-[11px] font-bold text-blue-600">Ver reporte completo -></a>
  </article>
  <article class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900"><h2 class="text-xs font-bold text-slate-950 dark:text-white">Horas trabajadas por empleado</h2><p class="mt-4 text-[11px] font-semibold text-slate-500">(promedio)</p><strong class="block text-2xl text-slate-950 dark:text-white">172.4 h</strong><p class="mt-3 text-xs font-bold text-slate-700 dark:text-slate-300">Horas extras (promedio)</p><strong class="mt-1 block text-2xl text-slate-950 dark:text-white">18.6 h</strong><a class="mt-5 block text-center text-[11px] font-bold text-blue-600">Ver reporte completo -></a></article>
  <article class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <h2 class="text-xs font-bold text-slate-950 dark:text-white">Asistencia mensual (%)</h2>
    <div class="mt-3 h-44 overflow-hidden">
      <ngx-charts-line-chart
        [view]="[380, 170]"
        [results]="monthlyAttendance"
        [scheme]="attendanceScheme"
        [legend]="false"
        [xAxis]="true"
        [yAxis]="true"
        [showGridLines]="true"
        [autoScale]="true"
        [timeline]="false"
        [yAxisTickFormatting]="percentFormat"
        [animations]="true">
      </ngx-charts-line-chart>
    </div>
    <a class="block text-center text-[11px] font-bold text-blue-600">Ver reporte completo -></a>
  </article>
</section>
