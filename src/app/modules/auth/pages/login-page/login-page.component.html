<main class="grid min-h-screen place-items-center bg-slate-100 px-4 dark:bg-slate-950">
  <section class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <p class="text-sm font-semibold text-emerald-600 dark:text-emerald-400">Ayni RR.HH.</p>
    <h1 class="mt-2 text-2xl font-semibold text-slate-950 dark:text-white">Ingresar al sistema</h1>
    <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">Usa una cuenta autorizada para acceder a los módulos de Recursos Humanos.</p>

    <form class="mt-6 space-y-4" (ngSubmit)="login()">
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-200">
        Correo
        <input
          type="email"
          name="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
        />
      </label>

      <label class="block text-sm font-medium text-slate-700 dark:text-slate-200">
        Contraseña
        <input
          type="password"
          name="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
        />
      </label>

      @if (error()) {
        <p class="rounded-md bg-red-50 px-3 py-2 text-sm text-red-700 dark:bg-red-500/10 dark:text-red-300">{{ error() }}</p>
      }

      <button class="w-full rounded-md bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700" type="submit">
        Iniciar sesión
      </button>
    </form>

    <a routerLink="/auth/recuperar-password" class="mt-4 inline-block text-sm font-medium text-emerald-700 dark:text-emerald-300">Recuperar contraseña</a>
  </section>
</main>
