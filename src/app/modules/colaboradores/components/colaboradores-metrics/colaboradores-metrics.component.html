<section class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
  @for (metric of metrics; track metric.label) {
    <article class="flex items-center gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
      <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full" [class]="toneClasses(metric.tone)">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path [attr.d]="iconPath(metric.icon)" /></svg>
      </span>
      <div class="min-w-0">
        <p class="text-[11px] font-semibold text-slate-600 dark:text-slate-300">{{ metric.label }}</p>
        <strong class="mt-0.5 block text-xl font-bold leading-tight text-slate-950 dark:text-white">{{ metric.value }}</strong>
        <p class="mt-0.5 text-[11px] text-emerald-600 dark:text-emerald-300">{{ metric.detail }}</p>
      </div>
    </article>
  }
</section>
