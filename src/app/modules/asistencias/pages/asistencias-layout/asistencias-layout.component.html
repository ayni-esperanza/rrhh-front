<section class="flex min-h-full flex-col gap-4">
  <header class="flex min-h-9 flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <h1 class="text-xl font-bold text-slate-950 dark:text-white">Asistencias</h1>
    <div class="flex flex-wrap items-center gap-2">
      <button class="inline-flex h-8 items-center justify-center gap-1.5 rounded-md border border-slate-200 bg-white px-2.5 text-[11px] font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white" type="button">
        <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.2 6.5"/><path d="M3 12A9 9 0 0 1 18.2 5.5"/><path d="M18 2v4h-4"/><path d="M6 22v-4h4"/></svg>
        Sincronizar con huelleros
      </button>
      <span class="inline-flex h-8 items-center gap-1.5 rounded-md border border-slate-200 bg-slate-100 px-2.5 text-[10px] font-semibold text-slate-600 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300"><span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>2 huelleros conectados</span>
    </div>
  </header>

  <section class="grid min-h-24 items-stretch gap-3 md:grid-cols-2 xl:grid-cols-5">
    @for (metric of metrics; track metric.label) {
      <article class="flex min-h-24 items-center gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full" [class]="toneClasses(metric.tone)">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path [attr.d]="iconPath(metric.icon)" /></svg>
        </span>
        <div class="min-w-0">
          <p class="text-[11px] font-semibold text-slate-600 dark:text-slate-300">{{ metric.label }}</p>
          <strong class="mt-0.5 block text-xl font-bold leading-tight text-slate-950 dark:text-white">{{ metric.value }}</strong>
          <p class="mt-0.5 truncate text-[11px] text-emerald-600 dark:text-emerald-300">{{ metric.detail }}</p>
        </div>
      </article>
    }
  </section>

  <section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <div class="grid gap-3 lg:grid-cols-[1.2fr_1fr_1fr_1.3fr_auto_auto] lg:items-end">
      <label class="space-y-1.5">
        <span class="text-[11px] font-bold text-slate-700 dark:text-slate-300">Colaborador</span>
        <span class="relative block">
          <svg class="pointer-events-none absolute left-3 top-1/2 h-3.5 w-3.5 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m21 21-4.3-4.3"/><circle cx="11" cy="11" r="8"/></svg>
          <input class="h-9 w-full rounded-md border border-slate-200 bg-white pl-9 pr-3 text-xs text-slate-700 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-200 dark:focus:ring-blue-500/20" placeholder="Buscar colaborador..." type="search" />
        </span>
      </label>
      <div class="space-y-1.5">
        <span class="text-[11px] font-bold text-slate-700 dark:text-slate-300">Rango de fechas</span>
        <div class="grid grid-cols-3 overflow-hidden rounded-md border border-slate-200 text-xs dark:border-slate-800">
          <button class="h-9 bg-white dark:bg-slate-950" type="button">Dia</button>
          <button class="h-9 border-x border-blue-200 bg-blue-50 font-semibold text-blue-700 dark:border-blue-500/30 dark:bg-blue-500/10 dark:text-blue-300" type="button">Semana</button>
          <button class="h-9 bg-white dark:bg-slate-950" type="button">Mes</button>
        </div>
      </div>
      <label class="space-y-1.5">
        <span class="text-[11px] font-bold text-slate-700 dark:text-slate-300">Mes</span>
        <select class="h-9 w-full rounded-md border border-slate-200 bg-white px-3 text-xs text-slate-700 outline-none dark:border-slate-800 dark:bg-slate-950 dark:text-slate-200">
          <option>Mayo 2025</option>
        </select>
      </label>
      <div class="space-y-1.5">
        <span class="text-[11px] font-bold text-slate-700 dark:text-slate-300">Semana</span>
        <div class="grid grid-cols-[2.5rem_1fr_2.5rem] overflow-hidden rounded-md border border-slate-200 text-xs dark:border-slate-800">
          <button class="h-9 bg-white dark:bg-slate-950" type="button" aria-label="Semana anterior"><svg class="mx-auto h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
          <button class="h-9 border-x border-slate-200 bg-white font-semibold dark:border-slate-800 dark:bg-slate-950" type="button">Semana 2 (05 - 11 May)</button>
          <button class="h-9 bg-white dark:bg-slate-950" type="button" aria-label="Semana siguiente"><svg class="mx-auto h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
        </div>
      </div>
      <button class="inline-flex h-9 items-center justify-center gap-2 rounded-md border border-slate-200 bg-white px-3 text-xs font-semibold text-slate-700 transition hover:bg-slate-50 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white" type="button"><svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>Exportar</button>
      <button class="inline-flex h-9 items-center justify-center gap-2 rounded-md border border-slate-200 bg-white px-3 text-xs font-semibold text-slate-700 transition hover:bg-slate-50 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white" type="button"><svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18l-7 8v5l-4 2v-7L3 5Z"/></svg>Filtros</button>
    </div>
  </section>

  <nav class="grid overflow-hidden rounded-lg border border-slate-200 bg-white text-xs font-semibold text-slate-700 shadow-sm dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 md:grid-cols-3">
    <button type="button" (click)="setActiveTab('horas-dia')" class="inline-flex h-11 items-center justify-center gap-2 border-t-2 px-3" [class]="tabClasses('horas-dia')"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Horas trabajadas por dia</button>
    <button type="button" (click)="setActiveTab('entrada-salida')" class="inline-flex h-11 items-center justify-center gap-2 border-t-2 px-3" [class]="tabClasses('entrada-salida')"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4v18h-4"/><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/></svg>Hora de entrada y salida</button>
    <button type="button" (click)="setActiveTab('lugar-trabajo')" class="inline-flex h-11 items-center justify-center gap-2 border-t-2 px-3" [class]="tabClasses('lugar-trabajo')"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-4.4 7-11a7 7 0 1 0-14 0c0 6.6 7 11 7 11Z"/><circle cx="12" cy="10" r="2"/></svg>Lugar donde esta trabajando</button>
  </nav>

  @switch (activeTab) {
    @case ('horas-dia') { <app-horas-dia-page /> }
    @case ('entrada-salida') { <app-entrada-salida-page /> }
    @case ('lugar-trabajo') { <app-lugar-trabajo-page /> }
  }
</section>
