<div class="min-h-screen bg-slate-100 text-slate-950 dark:bg-slate-950 dark:text-slate-100">
  <aside class="fixed inset-y-0 left-0 hidden w-64 border-r border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900 lg:block">
    <div class="mb-8">
      <p class="text-xs font-semibold uppercase tracking-wide text-emerald-600 dark:text-emerald-400">Ayni</p>
      <h1 class="text-lg font-semibold">RR.HH.</h1>
    </div>

    <nav class="space-y-1">
      @for (item of visibleNavigation(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300"
          class="block rounded-md px-3 py-2 text-sm font-medium text-slate-700 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  <div class="lg:pl-64">
    <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 px-4 py-3 backdrop-blur dark:border-slate-800 dark:bg-slate-900/90">
      <div class="flex items-center justify-between gap-4">
        <div>
          <p class="text-sm font-medium">{{ authService.user()?.name }}</p>
          <p class="text-xs text-slate-500 dark:text-slate-400">{{ authService.user()?.role }}</p>
        </div>

        <div class="flex items-center gap-2">
          <button
            type="button"
            (click)="toggleTheme()"
            class="rounded-md border border-slate-200 px-3 py-2 text-sm text-slate-700 transition-colors hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            {{ themeService.isDarkMode() ? 'Modo claro' : 'Modo oscuro' }}
          </button>
          <button
            type="button"
            (click)="logout()"
            class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white transition-colors hover:bg-slate-700 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200"
          >
            Cerrar sesión
          </button>
        </div>
      </div>

      <nav class="mt-3 flex gap-2 overflow-x-auto lg:hidden">
        @for (item of visibleNavigation(); track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300"
            class="whitespace-nowrap rounded-md px-3 py-2 text-sm text-slate-700 dark:text-slate-300"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </header>

    <main class="p-4 lg:p-8">
      <router-outlet />
    </main>
  </div>
</div>
